name: ghost_app_bar
description: >-
  An invisible app bar scaffold with a gradient scrim and iOS-style
  large-title collapse. Content scrolls behind the bar and dissolves
  into the status bar with no visible seam.
version: 0.1.1
repository: https://github.com/jubairp10/ghost_app_bar
topics:
  - appbar
  - scroll
  - ui
  - widget

environment:
  sdk: ^3.5.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
